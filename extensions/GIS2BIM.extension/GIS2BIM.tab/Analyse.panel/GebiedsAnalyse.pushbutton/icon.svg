  <rect x="24.6" y="13.4" width="5.2" height="5.2" rx="1" fill="#EFBD75"/>
  <!-- Rij 4 -->
  <rect x="2" y="19" width="5.2" height="5.2" rx="1" fill="#EF8B2C"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Achtergrond -->
  <rect width="32" height="32" rx="3" fill="#350E35"/>
  <!-- Element/type rechthoek -->
  <rect x="7" y="5" width="10" height="16" rx="1" fill="none" stroke="#45B6A8" stroke-width="1.5"/>
  <!-- Breedte maatlijn (b) -->
  <line x1="7" y1="24" x2="17" y2="24" stroke="#EFBD75" stroke-width="1"/>
  <line x1="7" y1="23" x2="7" y2="25" stroke="#EFBD75" stroke-width="1.2"/>
  <line x1="17" y1="23" x2="17" y2="25" stroke="#EFBD75" stroke-width="1.2"/>
  <text x="12" y="28.5" font-family="Segoe UI" font-size="6" font-weight="bold" fill="#EFBD75" text-anchor="middle">b</text>
  <!-- Hoogte maatlijn (h) -->
  <line x1="20" y1="5" x2="20" y2="21" stroke="#EFBD75" stroke-width="1"/>
  <line x1="19" y1="5" x2="21" y2="5" stroke="#EFBD75" stroke-width="1.2"/>
  <line x1="19" y1="21" x2="21" y2="21" stroke="#EFBD75" stroke-width="1.2"/>
  <text x="24" y="15" font-family="Segoe UI" font-size="6" font-weight="bold" fill="#EFBD75" text-anchor="middle">h</text>
  <!-- Hernoem-potlood -->
  <line x1="25" y1="25" x2="29" y2="5" stroke="#45B6A8" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="29,5 27.5,6 29,7.5" fill="#45B6A8"/>
</svg>

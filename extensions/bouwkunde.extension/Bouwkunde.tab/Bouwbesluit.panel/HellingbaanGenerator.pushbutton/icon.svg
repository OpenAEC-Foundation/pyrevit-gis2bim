<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Achtergrond -->
  <rect width="32" height="32" rx="3" fill="#350E35"/>
  
  <!-- Onderste vloer -->
  <line x1="4" y1="24" x2="12" y2="24" stroke="#808080" stroke-width="1.5" stroke-dasharray="2,1"/>
  
  <!-- Bovenste vloer -->
  <line x1="20" y1="10" x2="28" y2="10" stroke="#808080" stroke-width="1.5" stroke-dasharray="2,1"/>
  
  <!-- Hellingbaan: overgang onder (geel) -->
  <line x1="6" y1="24" x2="10" y2="21" stroke="#EFBD75" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Hellingbaan: hoofdhelling (teal) -->
  <line x1="10" y1="21" x2="22" y2="13" stroke="#45B6A8" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Hellingbaan: overgang boven (geel) -->
  <line x1="22" y1="13" x2="26" y2="10" stroke="#EFBD75" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Percentage teken -->
  <text x="16" y="29" font-family="Segoe UI" font-size="6" fill="#45B6A8" text-anchor="middle">%</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Achtergrond -->
  <rect width="32" height="32" rx="3" fill="#350E35"/>
  
  <!-- Spreadsheet -->
  <rect x="12" y="6" width="14" height="16" rx="1" fill="none" stroke="#45B6A8" stroke-width="1.5"/>
  
  <!-- Grid lijnen horizontaal -->
  <line x1="12" y1="10" x2="26" y2="10" stroke="#45B6A8" stroke-width="0.8"/>
  <line x1="12" y1="14" x2="26" y2="14" stroke="#45B6A8" stroke-width="0.8"/>
  <line x1="12" y1="18" x2="26" y2="18" stroke="#45B6A8" stroke-width="0.8"/>
  
  <!-- Grid lijnen verticaal -->
  <line x1="17" y1="6" x2="17" y2="22" stroke="#45B6A8" stroke-width="0.8"/>
  <line x1="21.5" y1="6" x2="21.5" y2="22" stroke="#45B6A8" stroke-width="0.8"/>
  
  <!-- Import pijl naar links -->
  <path d="M 11 14 L 6 14 M 8 11 L 5 14 L 8 17" 
        stroke="#45B6A8" stroke-width="2" stroke-linecap="round" 
        stroke-linejoin="round" fill="none"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Achtergrond -->
  <rect width="32" height="32" rx="3" fill="#350E35"/>
  
  <!-- Spreadsheet -->
  <rect x="6" y="6" width="14" height="16" rx="1" fill="none" stroke="#45B6A8" stroke-width="1.5"/>
  
  <!-- Grid lijnen horizontaal -->
  <line x1="6" y1="10" x2="20" y2="10" stroke="#45B6A8" stroke-width="0.8"/>
  <line x1="6" y1="14" x2="20" y2="14" stroke="#45B6A8" stroke-width="0.8"/>
  <line x1="6" y1="18" x2="20" y2="18" stroke="#45B6A8" stroke-width="0.8"/>
  
  <!-- Grid lijnen verticaal -->
  <line x1="11" y1="6" x2="11" y2="22" stroke="#45B6A8" stroke-width="0.8"/>
  <line x1="15.5" y1="6" x2="15.5" y2="22" stroke="#45B6A8" stroke-width="0.8"/>
  
  <!-- Export pijl naar rechts -->
  <path d="M 21 14 L 26 14 M 24 11 L 27 14 L 24 17" 
        stroke="#45B6A8" stroke-width="2" stroke-linecap="round" 
        stroke-linejoin="round" fill="none"/>
</svg>

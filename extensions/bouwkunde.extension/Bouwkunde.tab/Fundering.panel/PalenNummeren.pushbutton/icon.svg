  <text x="16" y="18" font-family="Arial" font-size="5" fill="white" text-anchor="middle" font-weight="bold">5</text>
  <text x="24" y="18" font-family="Arial" font-size="5" fill="white" text-anchor="middle" font-weight="bold">6</text>
  
  <text x="8" y="26" font-family="Arial" font-size="5" fill="white" text-anchor="middle" font-weight="bold">7</text>
  <text x="16" y="26" font-family="Arial" font-size="5" fill="white" text-anchor="middle" font-weight="bold">8</text>
  <text x="24" y="26" font-family="Arial" font-size="5" fill="white" text-anchor="middle" font-weight="bold">9</text>

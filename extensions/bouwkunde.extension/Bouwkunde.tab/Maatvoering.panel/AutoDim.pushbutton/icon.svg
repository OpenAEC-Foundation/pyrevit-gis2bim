<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Achtergrond -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="#350E35"/>
  
  <!-- Maatlijn horizontaal -->
  <line x1="5" y1="16" x2="27" y2="16" stroke="#45B6A8" stroke-width="2"/>
  
  <!-- Eindstrepen -->
  <line x1="5" y1="11" x2="5" y2="21" stroke="#45B6A8" stroke-width="2"/>
  <line x1="27" y1="11" x2="27" y2="21" stroke="#45B6A8" stroke-width="2"/>
  
  <!-- Tussenstrepen (wanden) -->
  <line x1="12" y1="13" x2="12" y2="19" stroke="#45B6A8" stroke-width="1.5"/>
  <line x1="20" y1="13" x2="20" y2="19" stroke="#45B6A8" stroke-width="1.5"/>
  
  <!-- Pijlpunten -->
  <polygon points="5,16 9,13.5 9,18.5" fill="#45B6A8"/>
  <polygon points="27,16 23,13.5 23,18.5" fill="#45B6A8"/>
  
  <!-- Maat tekst -->
  <text x="16" y="9" font-family="Segoe UI, Arial" font-size="6" font-weight="bold" fill="#EFBD75" text-anchor="middle">DIM</text>
</svg>
